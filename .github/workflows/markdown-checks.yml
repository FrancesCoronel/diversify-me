name: Markdown Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  markdownlint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 30
            --retry-wait-time 5
            --max-retries 3
            --exclude "mailto:"
            --user-agent "Mozilla/5.0 (compatible; lychee link checker)"
            --accept 200,202,415
            "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
